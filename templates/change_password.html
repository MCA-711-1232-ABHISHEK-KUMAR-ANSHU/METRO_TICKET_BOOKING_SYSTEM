<!DOCTYPE html>
<html>

<head>

<title>Change Password</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>
<h1>Change Password</h1>
</header>

{% include 'partials/nav.html' %}

<div class="container">

<h2>Change Password</h2>

<form id="passwordForm" novalidate>

<label>Current Password</label>
<input type="password" id="oldPassword" required>
<div class="error-text" id="oldPasswordError"></div>

<label>New Password</label>
<input type="password" id="newPassword" required minlength="6">
<div class="error-text" id="newPasswordError"></div>

<label>Confirm New Password</label>
<input type="password" id="confirmPassword" required>
<div class="error-text" id="confirmPasswordError"></div>

<button type="submit">Update Password</button>

</form>

</div>

<script>

document.getElementById("passwordForm").addEventListener("submit", function(e){

e.preventDefault()

document.querySelectorAll(".error-text").forEach(el => el.innerText = "")

let oldPassword = document.getElementById("oldPassword").value
let newPassword = document.getElementById("newPassword").value
let confirmPassword = document.getElementById("confirmPassword").value

let valid = true

if(!oldPassword){
    document.getElementById("oldPasswordError").innerText = "Current password is required"
    valid = false
}

if(newPassword.length < 6){
    document.getElementById("newPasswordError").innerText = "New password must be at least 6 characters"
    valid = false
}

if(newPassword !== confirmPassword){
    document.getElementById("confirmPasswordError").innerText = "Passwords do not match"
    valid = false
}

if(!valid) return

fetch("/change-password",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({old_password:oldPassword, new_password:newPassword})

})

.then(res=>res.json())
.then(data=>{
alert(data.message)
if(data.message === "Password changed successfully"){
    document.getElementById("passwordForm").reset()
}
})

})

</script>

</body>

</html>
