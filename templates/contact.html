<!DOCTYPE html>
<html>

<head>

<title>Contact Us</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<div class="container">

<h2>Get in Touch</h2>

<form id="contactForm" novalidate>

<label>Name</label>
<input type="text" id="name" required minlength="2">
<div class="error-text" id="nameError"></div>

<label>Email</label>
<input type="email" id="email" required>
<div class="error-text" id="emailError"></div>

<label>Subject</label>
<input type="text" id="subject">

<label>Message</label>
<textarea id="message" rows="4" required minlength="5"></textarea>
<div class="error-text" id="messageError"></div>

<button type="submit">Send Message</button>

</form>

<p class="center"><a href="/">Back to Home</a></p>

</div>

<script>

document.getElementById("contactForm").addEventListener("submit", function(e){

e.preventDefault()

document.querySelectorAll(".error-text").forEach(el => el.innerText = "")

let name = document.getElementById("name").value.trim()
let email = document.getElementById("email").value.trim()
let subject = document.getElementById("subject").value.trim()
let message = document.getElementById("message").value.trim()

let valid = true

if(name.length < 2){
    document.getElementById("nameError").innerText = "Please enter your name"
    valid = false
}

let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
if(!emailPattern.test(email)){
    document.getElementById("emailError").innerText = "Enter a valid email address"
    valid = false
}

if(message.length < 5){
    document.getElementById("messageError").innerText = "Please write a short message"
    valid = false
}

if(!valid) return

fetch("/contact",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name, email:email, subject:subject, message:message})

})

.then(res=>res.json())
.then(data=>{
alert(data.message)
document.getElementById("contactForm").reset()
})

})

</script>

</body>

</html>
