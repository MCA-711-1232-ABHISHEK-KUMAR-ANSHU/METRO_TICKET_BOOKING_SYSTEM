<!DOCTYPE html>
<html>

<head>

<title>Edit Station</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>
<h1>Edit Station</h1>
</header>

{% include 'partials/admin_nav.html' %}

<div class="container">

<h2>Edit Station</h2>

<form id="editStationForm" novalidate>

<label>Station Name</label>
<input type="text" id="stationName" value="{{ station.station_name }}" required minlength="2">
<div class="error-text" id="stationNameError"></div>

<label>Location</label>
<input type="text" id="location" value="{{ station.location or '' }}">

<button type="submit">Save Changes</button>
<a href="/admin/stations"><button type="button" class="secondary">Cancel</button></a>

</form>

</div>

<script>

document.getElementById("editStationForm").addEventListener("submit", function(e){

e.preventDefault()

document.getElementById("stationNameError").innerText = ""

let stationName = document.getElementById("stationName").value.trim()
let location = document.getElementById("location").value.trim()

if(stationName.length < 2){
    document.getElementById("stationNameError").innerText = "Station name is required"
    return
}

fetch("/admin/stations/edit/{{ station.station_id }}",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({station_name:stationName, location:location})

})

.then(res=>res.json())
.then(data=>{
alert(data.message)
window.location.href="/admin/stations"
})

})

</script>

</body>

</html>
