<!DOCTYPE html>
<html>

<head>

<title>Forgot Password</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>
<h1>Metro Ticket System</h1>
</header>

<div class="container">

<h2>Forgot Password</h2>

<p style="font-size:13px;color:#666;text-align:center;">
Enter your registered username and email to reset your password.
</p>

<form id="forgotForm" novalidate>

<label>Username</label>
<input type="text" id="username" placeholder="Username" required>
<div class="error-text" id="usernameError"></div>

<label>Email</label>
<input type="email" id="email" placeholder="Email" required>
<div class="error-text" id="emailError"></div>

<label>New Password</label>
<input type="password" id="newPassword" placeholder="New password (min 6 characters)" required minlength="6">
<div class="error-text" id="newPasswordError"></div>

<button type="submit">Reset Password</button>

</form>

<p class="center">
<a href="/login-page">Back to Login</a>
</p>

</div>

<script>

document.getElementById("forgotForm").addEventListener("submit", function(e){

e.preventDefault()

document.querySelectorAll(".error-text").forEach(el => el.innerText = "")

let username = document.getElementById("username").value.trim()
let email = document.getElementById("email").value.trim()
let newPassword = document.getElementById("newPassword").value

let valid = true

if(!username){
    document.getElementById("usernameError").innerText = "Username is required"
    valid = false
}

if(!email){
    document.getElementById("emailError").innerText = "Email is required"
    valid = false
}

if(newPassword.length < 6){
    document.getElementById("newPasswordError").innerText = "Password must be at least 6 characters"
    valid = false
}

if(!valid) return

fetch("/forgot-password",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:username,
email:email,
new_password:newPassword
})

})

.then(res=>res.json())
.then(data=>{

alert(data.message)

if(data.message && data.message.includes("updated")){
    window.location.href="/login-page"
}

})

})

</script>

</body>

</html>
