<!DOCTYPE html>
<html>

<head>

<title>Add Route</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>
<h1>Add Route</h1>
</header>

{% include 'partials/admin_nav.html' %}

<div class="container">

<h2>Add New Route &amp; Fare</h2>

<form id="addRouteForm" novalidate>

<label>Route Name</label>
<input type="text" id="routeName" placeholder="e.g. Danapur - Patliputra" required minlength="3">
<div class="error-text" id="routeNameError"></div>

<label>Start Station</label>
<select id="startStation" required>
<option value="">Select station</option>
{% for s in stations %}
<option value="{{ s.station_id }}">{{ s.station_name }}</option>
{% endfor %}
</select>
<div class="error-text" id="startStationError"></div>

<label>End Station</label>
<select id="endStation" required>
<option value="">Select station</option>
{% for s in stations %}
<option value="{{ s.station_id }}">{{ s.station_name }}</option>
{% endfor %}
</select>
<div class="error-text" id="endStationError"></div>

<label>Fare (&#8377;)</label>
<input type="number" id="fare" min="0" required>
<div class="error-text" id="fareError"></div>

<button type="submit">Add Route</button>
<a href="/admin/routes"><button type="button" class="secondary">Cancel</button></a>

</form>

</div>

<script>

document.getElementById("addRouteForm").addEventListener("submit", function(e){

e.preventDefault()

document.querySelectorAll(".error-text").forEach(el => el.innerText = "")

let routeName = document.getElementById("routeName").value.trim()
let startStation = document.getElementById("startStation").value
let endStation = document.getElementById("endStation").value
let fare = document.getElementById("fare").value

let valid = true

if(routeName.length < 3){
    document.getElementById("routeNameError").innerText = "Route name is required"
    valid = false
}

if(!startStation){
    document.getElementById("startStationError").innerText = "Please select a start station"
    valid = false
}

if(!endStation){
    document.getElementById("endStationError").innerText = "Please select an end station"
    valid = false
}

if(startStation && endStation && startStation === endStation){
    document.getElementById("endStationError").innerText = "Start and end stations cannot be the same"
    valid = false
}

if(fare === "" || fare < 0){
    document.getElementById("fareError").innerText = "Please enter a valid fare"
    valid = false
}

if(!valid) return

fetch("/admin/routes/add",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
route_name:routeName,
start_station:startStation,
end_station:endStation,
fare:fare
})

})

.then(res=>res.json())
.then(data=>{
alert(data.message)
window.location.href="/admin/routes"
})

})

</script>

</body>

</html>
