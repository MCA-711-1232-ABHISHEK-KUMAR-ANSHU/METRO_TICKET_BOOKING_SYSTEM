<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>
<h1>Metro Ticket System</h1>
</header>

<div class="container">

<h2>Register</h2>

<form id="registerForm" novalidate>

<label>Username</label>
<input type="text" id="username" placeholder="Username" required minlength="3">
<div class="error-text" id="usernameError"></div>

<label>Email</label>
<input type="email" id="email" placeholder="Email" required>
<div class="error-text" id="emailError"></div>

<label>Phone</label>
<input type="text" id="phone" placeholder="10 digit phone number" pattern="[0-9]{10}">
<div class="error-text" id="phoneError"></div>

<label>Password</label>
<input type="password" id="password" placeholder="Password (min 6 characters)" required minlength="6">
<div class="error-text" id="passwordError"></div>

<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Re-enter password" required>
<div class="error-text" id="confirmPasswordError"></div>

<button type="submit">Register</button>

</form>

<p class="center">
Already have an account?
<a href="/login-page">Login</a>
</p>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", function(e){

e.preventDefault()

document.querySelectorAll(".error-text").forEach(el => el.innerText = "")

let username = document.getElementById("username").value.trim()
let email = document.getElementById("email").value.trim()
let phone = document.getElementById("phone").value.trim()
let password = document.getElementById("password").value
let confirmPassword = document.getElementById("confirmPassword").value

let valid = true

if(username.length < 3){
    document.getElementById("usernameError").innerText = "Username must be at least 3 characters"
    valid = false
}

let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
if(!emailPattern.test(email)){
    document.getElementById("emailError").innerText = "Enter a valid email address"
    valid = false
}

if(phone && !/^[0-9]{10}$/.test(phone)){
    document.getElementById("phoneError").innerText = "Phone number must be 10 digits"
    valid = false
}

if(password.length < 6){
    document.getElementById("passwordError").innerText = "Password must be at least 6 characters"
    valid = false
}

if(password !== confirmPassword){
    document.getElementById("confirmPasswordError").innerText = "Passwords do not match"
    valid = false
}

if(!valid){
    return
}

fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:username,
email:email,
phone:phone,
password:password
})

})

.then(res=>res.json())
.then(data=>{

alert(data.message)

if(data.message === "User registered successfully"){
    window.location.href="/login-page"
}

})

})

</script>

</body>

</html>
